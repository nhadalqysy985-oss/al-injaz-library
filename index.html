<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة الإنجاز العلمية - منصة البحث الأكاديمي</title>
    
    <!-- Scripts Order: React -> Prop-Types -> Recharts -> Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Noto Sans Arabic', sans-serif; 
            background-color: #f8fafc;
        }
        .glass-morphism {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.4s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        const { BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, Cell } = window.Recharts || {};

        const Icon = ({ name, size = 20, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = `<i data-lucide="${name}" style="width: ${size}px; height: ${size}px;"></i>`;
                    window.lucide.createIcons({ container: iconRef.current });
                }
            }, [name, size]);
            return <span ref={iconRef} className={`inline-flex items-center justify-center ${className}`} style={{ width: size, height: size }}></span>;
        };

        const App = () => {
            const [query, setQuery] = useState('');
            const [results, setResults] = useState([]);
            const [loading, setLoading] = useState(false);
            const [selectedPaper, setSelectedPaper] = useState(null);
            const [researchInsight, setResearchInsight] = useState('');
            const [simplifiedAbstract, setSimplifiedAbstract] = useState('');
            const [simplifying, setSimplifying] = useState(false);

            const apiKey = ""; // يتم التعامل معه برمجياً في البيئة

            const fetchWithRetry = async (url, options, retries = 5, backoff = 1000) => {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) throw new Error('API Error');
                    return await response.json();
                } catch (err) {
                    if (retries > 0) {
                        await new Promise(res => setTimeout(res, backoff));
                        return fetchWithRetry(url, options, retries - 1, backoff * 2);
                    }
                    throw err;
                }
            };

            const callGemini = async (prompt) => {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                const payload = {
                    contents: [{ parts: [{ text: prompt }] }],
                    systemInstruction: { parts: [{ text: "أنت مساعد بحث علمي محترف، تجيب باللغة العربية الفصحى بشكل بشري ورصين." }] }
                };
                return await fetchWithRetry(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
            };

            const fetchPapers = async (searchTerm) => {
                if (!searchTerm.trim()) return;
                setLoading(true);
                setResults([]);
                setResearchInsight('');
                try {
                    const response = await fetch(`https://api.openalex.org/works?search=${encodeURIComponent(searchTerm)}&per_page=25`);
                    const data = await response.json();
                    const formatted = data.results.map(paper => ({
                        id: paper.id,
                        title: paper.display_name,
                        year: paper.publication_year,
                        authors: paper.authorships?.map(a => a.author.display_name).slice(0, 3).join('، ') || 'مؤلف غير معروف',
                        pdf: paper.open_access?.oa_url || null,
                        doi: paper.doi || '',
                        citations: paper.cited_by_count || 0,
                        journal: paper.primary_location?.source?.display_name || 'مجلة علمية'
                    }));
                    setResults(formatted);
                    
                    if (formatted.length > 0) {
                        const insightPrompt = `بناءً على نتائج البحث عن "${searchTerm}"، قدم فقرة واحدة ملهمة عن أهمية هذا المجال حالياً في تطوير المعرفة البشرية.`;
                        const insightData = await callGemini(insightPrompt);
                        setResearchInsight(insightData.candidates?.[0]?.content?.parts?.[0]?.text || '');
                    }
                } catch (err) {
                    console.error(err);
                } finally {
                    setLoading(false);
                }
            };

            const simplifyAbstractAction = async (paper) => {
                setSimplifying(true);
                setSimplifiedAbstract('');
                try {
                    const prompt = `استخلص أهم 3 مفاهيم جوهرية من البحث المعنون بـ "${paper.title}" بأسلوب أكاديمي مبسط جداً للطلاب وبشكل نقاط دقيقة.`;
                    const data = await callGemini(prompt);
                    setSimplifiedAbstract(data.candidates?.[0]?.content?.parts?.[0]?.text || 'تعذر استخلاص المفاهيم.');
                } catch (e) {
                    setSimplifiedAbstract('حدث خطأ في الاتصال بنظام المعالجة.');
                } finally {
                    setSimplifying(false);
                }
            };

            const chartData = useMemo(() => {
                const years = {};
                results.forEach(p => { years[p.year] = (years[p.year] || 0) + 1; });
                return Object.keys(years).sort().map(y => ({ name: y, value: years[y] }));
            }, [results]);

            return (
                <div className="min-h-screen bg-[#fcfdfe]">
                    {/* Header Nav */}
                    <nav className="glass-morphism h-20 border-b border-slate-200 sticky top-0 z-[100] px-8 flex items-center justify-between">
                        <div className="flex items-center gap-4">
                            <div className="w-12 h-12 bg-slate-900 rounded-2xl flex items-center justify-center shadow-xl">
                                <Icon name="library" className="text-white" size={24} />
                            </div>
                            <div>
                                <h1 className="text-2xl font-black text-slate-900 leading-none">مكتبة الإنجاز</h1>
                                <p className="text-[10px] text-blue-600 font-bold uppercase mt-1 tracking-wider">المنصة الأكاديمية الأولى</p>
                            </div>
                        </div>
                    </nav>

                    {/* Search Section */}
                    <header className="bg-white border-b border-slate-200 pt-20 pb-24 px-6 text-center relative overflow-hidden">
                         <div className="absolute inset-0 opacity-[0.02] pointer-events-none" style={{ backgroundImage: 'radial-gradient(#000 1px, transparent 1px)', backgroundSize: '20px 20px' }}></div>
                        <div className="max-w-4xl mx-auto relative z-10">
                            <h2 className="text-5xl font-black text-slate-900 mb-6 leading-tight">ابحث في ملايين الأبحاث العالمية</h2>
                            <p className="text-slate-500 text-xl mb-12 max-w-2xl mx-auto">وصول مباشر لقواعد البيانات العالمية مع تحليلات ذكية لأبحاث تخرجك ودراساتك.</p>
                            
                            <div className="max-w-3xl mx-auto relative">
                                <input 
                                    type="text" 
                                    value={query}
                                    onChange={(e) => setQuery(e.target.value)}
                                    onKeyDown={(e) => e.key === 'Enter' && fetchPapers(query)}
                                    placeholder="اكتب عنوان البحث أو موضوعك المفضل..."
                                    className="w-full h-20 bg-slate-50 border-2 border-slate-100 rounded-[30px] pr-16 pl-6 text-xl focus:bg-white focus:border-slate-900 transition-all outline-none shadow-sm"
                                />
                                <div className="absolute right-6 top-7 text-slate-300"><Icon name="search" size={28} /></div>
                                <button onClick={() => fetchPapers(query)} className="absolute left-3 top-3 bottom-3 bg-slate-900 text-white px-12 rounded-[22px] font-black hover:bg-black transition-all">
                                    {loading ? <Icon name="loader-2" className="animate-spin" /> : "بحث"}
                                </button>
                            </div>
                        </div>
                    </header>

                    {/* Results Area */}
                    <main className="max-w-7xl mx-auto px-6 py-16">
                        {loading ? (
                            <div className="py-20 text-center animate-pulse">
                                <Icon name="globe" size={60} className="text-slate-200 mb-6 mx-auto" />
                                <p className="text-slate-400 font-bold">جاري الربط مع خوادم البحث العالمية...</p>
                            </div>
                        ) : results.length > 0 ? (
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-12">
                                {/* Sidebar Statistics */}
                                <aside className="lg:col-span-4 space-y-8">
                                    <div className="bg-white border border-slate-200 rounded-[40px] p-8 shadow-sm">
                                        <h3 className="font-black text-slate-900 mb-8 flex items-center gap-3 text-lg">
                                            <Icon name="trending-up" size={22} className="text-blue-600" />
                                            الانتشار الزمني
                                        </h3>
                                        <div className="h-56 w-full">
                                            <ResponsiveContainer width="100%" height="100%">
                                                <BarChart data={chartData}>
                                                    <XAxis dataKey="name" hide />
                                                    <Tooltip cursor={{fill: '#f8fafc'}} contentStyle={{borderRadius:'15px', border:'none', boxShadow:'0 10px 15px rgba(0,0,0,0.05)'}} />
                                                    <Bar dataKey="value" fill="#1e293b" radius={[6, 6, 0, 0]} />
                                                </BarChart>
                                            </ResponsiveContainer>
                                        </div>
                                    </div>
                                    {researchInsight && (
                                        <div className="bg-slate-900 text-white rounded-[40px] p-10 relative overflow-hidden animate-slide-up">
                                            <div className="absolute -right-4 -top-4 opacity-10"><Icon name="zap" size={100} /></div>
                                            <h3 className="text-blue-400 font-black mb-6 flex items-center gap-2 text-lg"><Icon name="lightbulb" /> رؤية تحليلية</h3>
                                            <p className="text-base leading-relaxed text-slate-300 font-medium">{researchInsight}</p>
                                        </div>
                                    )}
                                </aside>

                                {/* Results List */}
                                <div className="lg:col-span-8 space-y-6">
                                    <div className="flex justify-between items-center mb-6 px-2">
                                        <span className="text-slate-400 font-bold text-sm">تم العثور على {results.length} بحث أكاديمي</span>
                                    </div>
                                    {results.map((paper) => (
                                        <div key={paper.id} className="bg-white border border-slate-200 rounded-[35px] p-8 hover:border-blue-400 transition-all group animate-slide-up shadow-sm">
                                            <div className="flex justify-between items-start mb-6">
                                                <div className="flex gap-3">
                                                    <span className="bg-blue-50 text-blue-700 px-4 py-1.5 rounded-xl text-xs font-black">{paper.year}</span>
                                                    <span className="bg-slate-100 text-slate-500 px-4 py-1.5 rounded-xl text-xs font-bold">{paper.citations} استشهاد</span>
                                                </div>
                                            </div>
                                            <h3 onClick={() => setSelectedPaper(paper)} className="text-2xl font-bold text-slate-900 mb-4 cursor-pointer hover:text-blue-600 transition-colors leading-snug">{paper.title}</h3>
                                            <div className="flex items-center gap-2 text-slate-400 text-sm mb-8">
                                                <Icon name="users" size={16} />
                                                <span>{paper.authors}</span>
                                                <span className="mx-2">•</span>
                                                <Icon name="book-open" size={16} />
                                                <span className="italic">{paper.journal}</span>
                                            </div>
                                            <div className="flex justify-between items-center pt-6 border-t border-slate-50">
                                                <button onClick={() => setSelectedPaper(paper)} className="text-sm font-black text-slate-900 flex items-center gap-2 group-hover:gap-4 transition-all">
                                                    عرض التفاصيل وتلخيص المفاهيم <Icon name="arrow-left" size={18} />
                                                </button>
                                                <div className="flex gap-3">
                                                    {paper.pdf && <a href={paper.pdf} target="_blank" className="w-10 h-10 bg-blue-50 text-blue-600 rounded-full flex items-center justify-center hover:bg-blue-600 hover:text-white transition-all"><Icon name="download" size={18} /></a>}
                                                    <a href={`https://doi.org/${paper.doi}`} target="_blank" className="w-10 h-10 border border-slate-100 text-slate-400 rounded-full flex items-center justify-center hover:bg-slate-50 transition-all"><Icon name="external-link" size={18} /></a>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ) : (
                            <div className="py-32 text-center">
                                <div className="w-24 h-24 bg-slate-50 rounded-full flex items-center justify-center mx-auto mb-8">
                                    <Icon name="search" size={40} className="text-slate-200" />
                                </div>
                                <h3 className="text-2xl font-black text-slate-900 mb-4">ابدأ رحلة البحث الأكاديمي</h3>
                                <p className="text-slate-400 max-w-md mx-auto">أدخل كلمات مفتاحية لموضوع بحثك وسأقوم بجلب أفضل النتائج العالمية لك.</p>
                            </div>
                        )}
                    </main>

                    {/* Detail Modal */}
                    {selectedPaper && (
                        <div className="fixed inset-0 z-[200] flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onClick={() => {setSelectedPaper(null); setSimplifiedAbstract('');}}></div>
                            <div className="bg-white w-full max-w-2xl rounded-[45px] shadow-2xl relative z-10 overflow-hidden flex flex-col max-h-[90vh]">
                                <div className="p-10 overflow-y-auto custom-scrollbar">
                                    <div className="flex justify-between items-center mb-10">
                                        <span className="text-xs font-black text-blue-600 bg-blue-50 px-5 py-2 rounded-full uppercase tracking-tighter">تفاصيل البحث العلمي</span>
                                        <button onClick={() => {setSelectedPaper(null); setSimplifiedAbstract('');}} className="p-2 text-slate-400 hover:text-slate-900 transition-colors"><Icon name="x" size={28} /></button>
                                    </div>
                                    <h2 className="text-2xl font-black text-slate-900 mb-8 leading-tight">{selectedPaper.title}</h2>
                                    
                                    <div className="grid grid-cols-2 gap-4 mb-10 text-right">
                                        <div className="bg-slate-50 p-5 rounded-3xl">
                                            <p className="text-[10px] text-slate-400 font-bold mb-1 uppercase">السنة</p>
                                            <p className="text-slate-900 font-black">{selectedPaper.year}</p>
                                        </div>
                                        <div className="bg-slate-50 p-5 rounded-3xl">
                                            <p className="text-[10px] text-slate-400 font-bold mb-1 uppercase">الاستشهادات</p>
                                            <p className="text-slate-900 font-black">{selectedPaper.citations}</p>
                                        </div>
                                    </div>

                                    <div className="bg-blue-600 rounded-[35px] p-8 text-white mb-10 shadow-xl shadow-blue-100">
                                        <div className="flex items-center justify-between mb-6">
                                            <h4 className="text-lg font-black flex items-center gap-2"><Icon name="sparkles" /> استخلاص المفاهيم الجوهرية</h4>
                                            {simplifiedAbstract && <Icon name="check-circle" className="text-blue-300" />}
                                        </div>
                                        
                                        {!simplifiedAbstract ? (
                                            <div className="space-y-4">
                                                <p className="text-blue-100 text-sm leading-relaxed">هل تود معالجة هذا البحث بالذكاء الاصطناعي لاستخراج أهم 3 نقاط محورية فيه؟</p>
                                                <button 
                                                    onClick={() => simplifyAbstractAction(selectedPaper)}
                                                    disabled={simplifying}
                                                    className="bg-white text-blue-600 px-10 py-4 rounded-[20px] font-black text-sm hover:scale-105 transition-all shadow-lg flex items-center gap-2"
                                                >
                                                    {simplifying ? <Icon name="loader-2" className="animate-spin" /> : <Icon name="zap" size={16} />}
                                                    {simplifying ? "جاري المعالجة..." : "لخص المفاهيم الآن"}
                                                </button>
                                            </div>
                                        ) : (
                                            <div className="text-blue-50 text-base leading-loose bg-blue-700/40 p-6 rounded-[25px] whitespace-pre-line border border-blue-400/30">
                                                {simplifiedAbstract}
                                            </div>
                                        )}
                                    </div>

                                    <div className="flex gap-4">
                                        {selectedPaper.pdf && (
                                            <a href={selectedPaper.pdf} target="_blank" className="flex-1 bg-slate-900 text-white py-5 rounded-[22px] font-black text-center flex items-center justify-center gap-2 hover:bg-black transition-all shadow-lg">
                                                <Icon name="download" size={18} /> تحميل الـ PDF
                                            </a>
                                        )}
                                        <button onClick={() => setSelectedPaper(null)} className="flex-1 border-2 border-slate-100 py-5 rounded-[22px] font-black text-slate-900 hover:bg-slate-50 transition-all">إغلاق</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
