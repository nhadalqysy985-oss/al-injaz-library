<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة الإنجاز العلمية | المنصة البحثية المتكاملة</title>
    
    <!-- مكتبات التشغيل الأساسية - تم تحديث الإصدارات لضمان التوافق -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- مكتبات الرسوم والرموز - استخدام نسخ متوافقة مع التوزيع العام -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@100;400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Noto Sans Arabic', sans-serif; 
            background-color: #fcfdfe;
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
        }
        .custom-shadow {
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
        }
        .paper-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .paper-card:hover {
            transform: translateY(-4px);
            border-color: #cbd5e1;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        
        // التحقق من وجود Recharts قبل التفكيك لتجنب خطأ التعريف
        const { 
            BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, Cell 
        } = window.Recharts || {};

        // إعدادات المفتاح
        const API_KEY = ""; 

        const Icon = ({ name, className = "w-5 h-5" }) => {
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const App = () => {
            const [query, setQuery] = useState('');
            const [results, setResults] = useState([]);
            const [loading, setLoading] = useState(false);
            const [insightLoading, setInsightLoading] = useState(false);
            const [error, setError] = useState(null);
            const [sortBy, setSortBy] = useState('year_desc');
            const [bookmarks, setBookmarks] = useState(() => {
                try {
                    const saved = localStorage.getItem('research_bookmarks');
                    return saved ? JSON.parse(saved) : [];
                } catch (e) { return []; }
            });
            const [selectedPaper, setSelectedPaper] = useState(null);
            const [researchInsight, setResearchInsight] = useState('');
            const [simplifiedAbstract, setSimplifiedAbstract] = useState('');
            const [simplifying, setSimplifying] = useState(false);

            useEffect(() => {
                localStorage.setItem('research_bookmarks', JSON.stringify(bookmarks));
            }, [bookmarks]);

            const fetchPapers = async (searchTerm) => {
                if (!searchTerm.trim()) return;
                setLoading(true);
                setError(null);
                setResearchInsight('');
                setResults([]);

                try {
                    const response = await fetch(`https://api.openalex.org/works?search=${encodeURIComponent(searchTerm)}&per_page=25`);
                    if (!response.ok) throw new Error('Network response was not ok');
                    const data = await response.json();

                    const formatted = data.results.map(paper => ({
                        id: paper.id,
                        title: paper.display_name,
                        year: paper.publication_year,
                        authors: paper.authorships?.map(a => a.author.display_name).slice(0, 3).join('، ') + (paper.authorships?.length > 3 ? ' وآخرون' : '') || 'مؤلف غير معروف',
                        journal: paper.primary_location?.source?.display_name || 'مصدر أكاديمي',
                        pdf: paper.open_access?.oa_url || null,
                        doi: paper.doi || '',
                        citations: paper.cited_by_count || 0,
                        source: 'OpenAlex Global'
                    }));

                    setResults(formatted);
                    if (formatted.length > 0) {
                        generateResearchInsight(searchTerm, formatted);
                    }
                } catch (err) {
                    setError("تعذر الاتصال بالمستودعات العالمية حالياً.");
                } finally {
                    setLoading(false);
                }
            };

            const generateResearchInsight = async (topic, papers) => {
                if (!API_KEY) return;
                setInsightLoading(true);
                const context = papers.slice(0, 5).map(p => p.title).join(', ');
                try {
                    const prompt = `بصفتك محللاً أكاديمياً، قدم رؤية موجزة بالعربية حول موضوع "${topic}" بناءً على هذه الأبحاث: ${context}. ابدأ بـ "الرؤية التحليلية للمسار البحثي: "`;
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    const data = await res.json();
                    setResearchInsight(data.candidates?.[0]?.content?.parts?.[0]?.text || '');
                } catch (e) { console.error("Insight Error:", e); }
                finally { setInsightLoading(false); }
            };

            const simplifyResearch = async (paper) => {
                if (!API_KEY) {
                    setSimplifiedAbstract("يرجى إضافة مفتاح API لتفعيل ميزة الذكاء الاصطناعي.");
                    return;
                }
                setSimplifying(true);
                try {
                    const prompt = `لخص جوهر البحث بعنوان "${paper.title}" في 3 نقاط مركزة جداً بالعربية للباحثين غير المتخصصين.`;
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${API_KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    const data = await res.json();
                    setSimplifiedAbstract(data.candidates?.[0]?.content?.parts?.[0]?.text || '');
                } catch (e) { setSimplifiedAbstract('فشل استخلاص البيانات الذكي.'); }
                finally { setSimplifying(false); }
            };

            const toggleBookmark = (paper) => {
                if (bookmarks.find(b => b.id === paper.id)) {
                    setBookmarks(bookmarks.filter(b => b.id !== paper.id));
                } else {
                    setBookmarks([...bookmarks, paper]);
                }
            };

            const processedResults = useMemo(() => {
                let sorted = [...results];
                if (sortBy === 'year_asc') sorted.sort((a, b) => a.year - b.year);
                else if (sortBy === 'year_desc') sorted.sort((a, b) => b.year - a.year);
                else if (sortBy === 'citations') sorted.sort((a, b) => b.citations - a.citations);
                return sorted;
            }, [results, sortBy]);

            const chartData = useMemo(() => {
                const years = {};
                results.forEach(p => { years[p.year] = (years[p.year] || 0) + 1; });
                return Object.keys(years).sort().map(y => ({ year: y, count: years[y] }));
            }, [results]);

            return (
                <div className="min-h-screen">
                    <nav className="glass-effect sticky top-0 z-50 border-b border-slate-200 px-6 py-4">
                        <div className="max-w-7xl mx-auto flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 bg-slate-900 rounded-xl flex items-center justify-center text-white shadow-lg">
                                    <Icon name="library" />
                                </div>
                                <div>
                                    <h1 className="text-xl font-black text-slate-900 leading-none">مكتبة الإنجاز</h1>
                                    <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest mt-1">المنصة الأكاديمية</p>
                                </div>
                            </div>
                            <div className="flex items-center gap-4">
                                <button className="relative p-2 text-slate-600">
                                    <Icon name="bookmark" />
                                    {bookmarks.length > 0 && (
                                        <span className="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] w-4 h-4 rounded-full flex items-center justify-center font-bold">{bookmarks.length}</span>
                                    )}
                                </button>
                                <button className="bg-slate-900 text-white px-5 py-2 rounded-xl text-xs font-bold hover:bg-black transition-all">دخول الباحثين</button>
                            </div>
                        </div>
                    </nav>

                    <header className="bg-white border-b border-slate-100 py-16 px-6">
                        <div className="max-w-4xl mx-auto text-center">
                            <div className="inline-flex items-center gap-2 bg-indigo-50 text-indigo-700 px-4 py-1.5 rounded-full text-[10px] font-black mb-6 border border-indigo-100">
                                <Icon name="microscope" className="w-3 h-3" /> قاعدة بيانات عالمية موحدة (OpenAlex)
                            </div>
                            <h2 className="text-4xl md:text-5xl font-black text-slate-900 mb-8 leading-tight">استكشف آفاق العلم والمعرفة</h2>
                            <div className="relative max-w-2xl mx-auto">
                                <input 
                                    type="text" 
                                    value={query}
                                    onChange={(e) => setQuery(e.target.value)}
                                    onKeyDown={(e) => e.key === 'Enter' && fetchPapers(query)}
                                    placeholder="ابحث عن موضوع، مؤلف، أو معرف DOI..."
                                    className="w-full bg-slate-50 border-2 border-slate-100 rounded-2xl py-5 pr-14 pl-4 text-lg focus:border-slate-900 outline-none transition-all shadow-sm"
                                />
                                <div className="absolute right-5 top-5 text-slate-300">
                                    <Icon name="search" className="w-7 h-7" />
                                </div>
                                <button 
                                    onClick={() => fetchPapers(query)}
                                    className="absolute left-2 top-2 bottom-2 bg-slate-900 text-white px-8 rounded-xl font-bold hover:bg-black transition-all"
                                >
                                    بحث
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-6 py-12">
                        {error && (
                            <div className="bg-red-50 text-red-600 p-4 rounded-2xl mb-8 font-bold text-center border border-red-100">
                                {error}
                            </div>
                        )}

                        {loading ? (
                            <div className="py-20 text-center">
                                <div className="inline-block w-12 h-12 border-4 border-slate-900 border-t-transparent rounded-full animate-spin mb-4"></div>
                                <p className="text-slate-500 font-bold">جاري استرجاع البيانات البحثية...</p>
                            </div>
                        ) : results.length > 0 ? (
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                                <aside className="lg:col-span-4 space-y-6">
                                    {chartData.length > 0 && window.Recharts && (
                                        <div className="bg-white border border-slate-200 rounded-3xl p-6 custom-shadow">
                                            <h3 className="font-black text-slate-900 mb-4 flex items-center gap-2">
                                                <Icon name="trending-up" className="text-indigo-600" /> الكثافة السنوية
                                            </h3>
                                            <div className="h-40">
                                                <ResponsiveContainer width="100%" height="100%">
                                                    <BarChart data={chartData}>
                                                        <XAxis dataKey="year" hide />
                                                        <Tooltip />
                                                        <Bar dataKey="count" fill="#4f46e5" radius={[4, 4, 0, 0]} />
                                                    </BarChart>
                                                </ResponsiveContainer>
                                            </div>
                                        </div>
                                    )}
                                    {researchInsight && (
                                        <div className="bg-slate-900 text-white rounded-3xl p-6 shadow-xl animate-fade-in">
                                            <h3 className="font-black mb-3 flex items-center gap-2"><Icon name="target" className="text-indigo-400" /> الرؤية التحليلية</h3>
                                            <p className="text-xs text-indigo-100 leading-relaxed">{researchInsight}</p>
                                        </div>
                                    )}
                                </aside>

                                <div className="lg:col-span-8 space-y-4">
                                    <div className="flex justify-between items-center bg-slate-50 p-3 rounded-xl border border-slate-100">
                                        <span className="text-xs font-bold text-slate-500 tracking-wide uppercase">تم العثور على {results.length} ورقة</span>
                                        <select 
                                            className="bg-transparent text-xs font-black outline-none cursor-pointer"
                                            value={sortBy}
                                            onChange={(e) => setSortBy(e.target.value)}
                                        >
                                            <option value="year_desc">الأحدث</option>
                                            <option value="year_asc">الأقدم</option>
                                            <option value="citations">الأكثر استشهاداً</option>
                                        </select>
                                    </div>

                                    {processedResults.map(item => (
                                        <article key={item.id} className="bg-white border border-slate-200 p-6 rounded-3xl paper-card animate-fade-in">
                                            <div className="flex justify-between items-start mb-3">
                                                <span className="text-[10px] font-black bg-slate-100 px-3 py-1 rounded-lg text-slate-500">{item.year}</span>
                                                <button onClick={() => toggleBookmark(item)} className={bookmarks.find(b => b.id === item.id) ? 'text-indigo-600' : 'text-slate-300'}>
                                                    <Icon name={bookmarks.find(b => b.id === item.id) ? 'bookmark-check' : 'bookmark'} />
                                                </button>
                                            </div>
                                            <h3 onClick={() => setSelectedPaper(item)} className="text-lg font-black text-slate-900 mb-3 cursor-pointer hover:text-indigo-600 leading-relaxed transition-colors">
                                                {item.title}
                                            </h3>
                                            <div className="flex flex-wrap gap-x-6 gap-y-2 text-xs text-slate-500 mb-6 font-bold">
                                                <span className="flex items-center gap-1.5"><Icon name="user" className="w-3.5 h-3.5" /> {item.authors}</span>
                                                <span className="flex items-center gap-1.5"><Icon name="book" className="w-3.5 h-3.5" /> {item.journal}</span>
                                                <span className="text-indigo-600 flex items-center gap-1.5"><Icon name="trending-up" className="w-3.5 h-3.5" /> {item.citations} استشهاد</span>
                                            </div>
                                            <div className="flex gap-3 pt-4 border-t border-slate-50">
                                                <button onClick={() => setSelectedPaper(item)} className="text-xs font-black text-slate-900 flex items-center gap-1">عرض التفاصيل <Icon name="chevron-right" className="w-4 h-4"/></button>
                                                <div className="mr-auto flex gap-2">
                                                    {item.pdf && <a href={item.pdf} target="_blank" className="p-2 bg-slate-900 text-white rounded-lg transition-transform hover:scale-110" title="تحميل الملف"><Icon name="download" className="w-4 h-4"/></a>}
                                                    <a href={item.doi ? `https://doi.org/${item.doi}` : '#'} target="_blank" className="p-2 border border-slate-200 text-slate-400 rounded-lg transition-transform hover:scale-110" title="فتح الرابط الأصلي"><Icon name="external-link" className="w-4 h-4"/></a>
                                                </div>
                                            </div>
                                        </article>
                                    ))}
                                </div>
                            </div>
                        ) : (
                            <div className="text-center py-32 border-2 border-dashed border-slate-100 rounded-[40px]">
                                <Icon name="search" className="w-16 h-16 mx-auto mb-6 text-slate-200" />
                                <h3 className="text-xl font-black text-slate-900 mb-2">ابدأ بحثك العلمي الآن</h3>
                                <p className="text-slate-400 text-sm">أدخل عنواناً أو كلمات مفتاحية في محرك البحث أعلاه لاسترجاع نتائج حقيقية</p>
                            </div>
                        )}
                    </main>

                    {selectedPaper && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onClick={() => setSelectedPaper(null)}></div>
                            <div className="bg-white w-full max-w-2xl rounded-[32px] p-8 relative z-10 shadow-2xl animate-fade-in overflow-y-auto max-h-[90vh]">
                                <div className="flex justify-between mb-6">
                                    <span className="text-[10px] font-black uppercase text-slate-400 tracking-widest">تفاصيل الورقة العلمية</span>
                                    <button onClick={() => setSelectedPaper(null)}><Icon name="x" className="w-6 h-6 text-slate-300 hover:text-slate-900" /></button>
                                </div>
                                <h2 className="text-2xl font-black text-slate-900 mb-6 leading-tight">{selectedPaper.title}</h2>
                                <div className="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
                                    <div className="bg-slate-50 p-4 rounded-2xl"><div className="text-[10px] text-slate-400 mb-1">السنة</div><div className="font-black">{selectedPaper.year}</div></div>
                                    <div className="bg-indigo-50 p-4 rounded-2xl col-span-2"><div className="text-[10px] text-indigo-400 mb-1">المصدر / المجلة</div><div className="font-black truncate text-indigo-700">{selectedPaper.journal}</div></div>
                                </div>
                                <div className="bg-slate-900 rounded-3xl p-6 text-white mb-6">
                                    <h4 className="font-black mb-3 flex items-center gap-2"><Icon name="sparkles" className="text-indigo-400" /> الذكاء الاصطناعي (استخلاص الجوهر)</h4>
                                    {!simplifiedAbstract ? (
                                        <button 
                                            onClick={() => simplifyResearch(selectedPaper)}
                                            className="bg-white text-slate-900 px-6 py-2 rounded-xl text-xs font-black flex items-center gap-2 hover:bg-indigo-50 transition-colors"
                                            disabled={simplifying}
                                        >
                                            {simplifying ? <Icon name="loader-2" className="animate-spin" /> : <Icon name="zap" />} بدء التحليل الذكي
                                        </button>
                                    ) : <p className="text-xs leading-relaxed text-indigo-100 whitespace-pre-line">{simplifiedAbstract}</p>}
                                </div>
                                <div className="flex gap-4">
                                    {selectedPaper.pdf && <a href={selectedPaper.pdf} target="_blank" className="flex-1 bg-slate-900 text-white py-4 rounded-xl font-black text-center text-xs hover:bg-black transition-all">تحميل PDF المفتوح</a>}
                                    <a href={selectedPaper.doi ? `https://doi.org/${selectedPaper.doi}` : '#'} target="_blank" className="flex-1 border-2 border-slate-100 py-4 rounded-xl font-black text-center text-xs hover:border-slate-300 transition-all">فتح عبر DOI</a>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
