<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة الإنجاز العلمية - منصة البحث الأكاديمي</title>
    
    <!-- Scripts Order: React -> Prop-Types -> Recharts -> Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Noto Sans Arabic', sans-serif; 
            background-color: #f8fafc;
        }
        .glass-morphism {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .search-shadow:focus-within {
            box-shadow: 0 10px 25px -5px rgba(59, 130, 246, 0.15);
        }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.5s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;
        
        // Destructure Recharts safely with a fallback
        const { 
            BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer 
        } = window.Recharts || {};

        /**
         * Fixed Icon component to prevent "removeChild" errors.
         * Using a ref to manage Lucide icons inside a stable container.
         */
        const Icon = ({ name, size = 20, className = "" }) => {
            const iconRef = useRef(null);

            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    // Clear previous content to avoid duplicate icons or DOM mismatches
                    iconRef.current.innerHTML = `<i data-lucide="${name}" style="width: ${size}px; height: ${size}px;"></i>`;
                    window.lucide.createIcons({
                        container: iconRef.current
                    });
                }
            }, [name, size]);

            return (
                <span 
                    ref={iconRef} 
                    className={`inline-flex items-center justify-center ${className}`}
                    style={{ width: size, height: size }}
                ></span>
            );
        };

        const App = () => {
            const [query, setQuery] = useState('');
            const [results, setResults] = useState([]);
            const [loading, setLoading] = useState(false);
            const [sortBy, setSortBy] = useState('year_desc');
            const [bookmarks, setBookmarks] = useState(() => {
                try {
                    const saved = localStorage.getItem('research_bookmarks_v2');
                    return saved ? JSON.parse(saved) : [];
                } catch { return []; }
            });
            const [selectedPaper, setSelectedPaper] = useState(null);
            const [researchInsight, setResearchInsight] = useState('');
            const [simplifiedAbstract, setSimplifiedAbstract] = useState('');
            const [simplifying, setSimplifying] = useState(false);

            const apiKey = ""; // Gemini API Key Placeholder

            useEffect(() => {
                localStorage.setItem('research_bookmarks_v2', JSON.stringify(bookmarks));
            }, [bookmarks]);

            const fetchPapers = async (searchTerm) => {
                if (!searchTerm.trim()) return;
                setLoading(true);
                setResults([]);
                setResearchInsight('');

                try {
                    const response = await fetch(`https://api.openalex.org/works?search=${encodeURIComponent(searchTerm)}&per_page=30`);
                    if (!response.ok) throw new Error('Network response was not ok');
                    const data = await response.json();

                    const formatted = data.results.map(paper => ({
                        id: paper.id,
                        title: paper.display_name,
                        year: paper.publication_year,
                        authors: paper.authorships?.map(a => a.author.display_name).slice(0, 3).join('، ') || 'مؤلف غير معروف',
                        journal: paper.primary_location?.source?.display_name || 'مصدر غير محدد',
                        pdf: paper.open_access?.oa_url || null,
                        doi: paper.doi || '',
                        citations: paper.cited_by_count || 0,
                        abstract: "هذا البحث يمثل مساهمة علمية رصينة في مجاله التخصصي، حيث يستعرض أحدث المنهجيات والنتائج العلمية الموثقة."
                    }));

                    setResults(formatted);
                    if (formatted.length > 0) generateInsight(searchTerm, formatted);
                } catch (err) {
                    console.error("Fetch error:", err);
                } finally {
                    setLoading(false);
                }
            };

            const generateInsight = async (topic, papers) => {
                const context = papers.slice(0, 5).map(p => `- ${p.title}`).join('\n');
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            contents: [{ parts: [{ text: `أنت خبير أكاديمي. حلل موضوع "${topic}" بناءً على هذه الأبحاث:\n${context}\nقدم فقرة تحليلية واحدة بالعربية تبدأ بـ "الرؤية التحليلية:".` }] }] 
                        })
                    });
                    const data = await res.json();
                    setResearchInsight(data.candidates?.[0]?.content?.parts?.[0]?.text || '');
                } catch (e) { console.error("Insight Error:", e); }
            };

            const simplifyAbstractAction = async (paper) => {
                setSimplifying(true);
                try {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            contents: [{ parts: [{ text: `لخص البحث "${paper.title}" في 3 نقاط جوهرية بسيطة بالعربية للباحثين المبتدئين.` }] }] 
                        })
                    });
                    const data = await res.json();
                    setSimplifiedAbstract(data.candidates?.[0]?.content?.parts?.[0]?.text || '');
                } catch (e) { setSimplifiedAbstract('تعذر تبسيط المحتوى حالياً.'); }
                finally { setSimplifying(false); }
            };

            const processedResults = useMemo(() => {
                let sorted = [...results];
                if (sortBy === 'year_asc') sorted.sort((a, b) => a.year - b.year);
                else if (sortBy === 'year_desc') sorted.sort((a, b) => b.year - a.year);
                else if (sortBy === 'citations') sorted.sort((a, b) => b.citations - a.citations);
                return sorted;
            }, [results, sortBy]);

            const chartData = useMemo(() => {
                const years = {};
                results.forEach(p => { years[p.year] = (years[p.year] || 0) + 1; });
                return Object.keys(years).sort().map(y => ({ name: y, value: years[y] }));
            }, [results]);

            return (
                <div className="min-h-screen pb-20 overflow-x-hidden">
                    <nav className="glass-morphism h-20 border-b border-slate-200 sticky top-0 z-[100] px-6 flex items-center justify-between">
                        <div className="flex items-center gap-4">
                            <div className="w-11 h-11 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-200">
                                <Icon name="library" className="text-white" />
                            </div>
                            <div>
                                <h1 className="text-xl font-black text-slate-900 leading-none">مكتبة الإنجاز</h1>
                                <p className="text-[10px] text-blue-600 font-bold uppercase tracking-tighter mt-1">Research Discovery Platform</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-6">
                            <button className="relative group">
                                <Icon name="bookmark" className="text-slate-500 group-hover:text-blue-600 transition-colors" />
                                {bookmarks.length > 0 && (
                                    <span className="absolute -top-2 -right-2 bg-red-500 text-white text-[9px] w-4 h-4 rounded-full flex items-center justify-center font-bold">
                                        {bookmarks.length}
                                    </span>
                                )}
                            </button>
                            <button className="bg-slate-900 text-white px-5 py-2.5 rounded-xl text-xs font-bold hover:bg-black transition-all">بوابة الباحثين</button>
                        </div>
                    </nav>

                    <header className="bg-white border-b border-slate-200 py-20 px-6 text-center relative overflow-hidden">
                        <div className="max-w-4xl mx-auto relative z-10">
                            <h2 className="text-5xl font-black text-slate-900 mb-6 leading-tight">ابحث في كنوز العلم العالمية</h2>
                            <p className="text-slate-500 text-lg mb-10 max-w-2xl mx-auto">نربطك بأكثر من 200 مليون ورقة بحثية مع أدوات تحليلية مدعومة بالذكاء الاصطناعي.</p>
                            
                            <div className="max-w-2xl mx-auto relative search-shadow transition-all">
                                <input 
                                    type="text" 
                                    value={query}
                                    onChange={(e) => setQuery(e.target.value)}
                                    onKeyDown={(e) => e.key === 'Enter' && fetchPapers(query)}
                                    placeholder="اكتب عنوان البحث، اسم المؤلف، أو الكلمات المفتاحية..."
                                    className="w-full h-16 bg-slate-50 border-2 border-slate-100 rounded-3xl pr-14 pl-4 text-lg focus:bg-white focus:border-blue-500 transition-all outline-none"
                                />
                                <div className="absolute right-5 top-5 text-slate-400">
                                    <Icon name="search" size={24} />
                                </div>
                                <button 
                                    onClick={() => fetchPapers(query)}
                                    className="absolute left-2 top-2 bottom-2 bg-blue-600 text-white px-8 rounded-2xl font-bold hover:bg-blue-700 transition-all flex items-center gap-2"
                                >
                                    {loading ? <Icon name="loader-2" className="animate-spin" /> : "بحث ذكي"}
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-6 py-12">
                        {loading ? (
                            <div className="flex flex-col items-center justify-center py-40">
                                <div className="w-16 h-16 border-4 border-blue-600 border-t-transparent rounded-full animate-spin mb-6"></div>
                                <p className="text-slate-400 font-bold animate-pulse">جاري استرجاع البيانات العالمية...</p>
                            </div>
                        ) : results.length > 0 ? (
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-10">
                                <aside className="lg:col-span-4 space-y-6">
                                    {BarChart && (
                                        <div className="bg-white border border-slate-200 rounded-[32px] p-6 shadow-sm">
                                            <h3 className="font-black text-slate-900 mb-6 flex items-center gap-2 text-sm">
                                                <Icon name="trending-up" size={18} className="text-blue-600" /> التوزيع الزمني للأبحاث
                                            </h3>
                                            <div className="h-48 w-full">
                                                <ResponsiveContainer width="100%" height="100%">
                                                    <BarChart data={chartData}>
                                                        <XAxis dataKey="name" hide />
                                                        <Tooltip cursor={{fill: '#f1f5f9'}} contentStyle={{borderRadius: '12px', border: 'none', boxShadow: '0 10px 15px -3px rgba(0,0,0,0.1)'}} />
                                                        <Bar dataKey="value" fill="#3b82f6" radius={[4, 4, 0, 0]} />
                                                    </BarChart>
                                                </ResponsiveContainer>
                                            </div>
                                        </div>
                                    )}

                                    {researchInsight && (
                                        <div className="bg-slate-900 text-white rounded-[32px] p-8 shadow-xl relative overflow-hidden animate-slide-up">
                                            <h3 className="text-blue-400 font-black mb-4 flex items-center gap-2">
                                                <Icon name="zap" size={18} /> تحليل الذكاء الاصطناعي
                                            </h3>
                                            <p className="text-sm leading-relaxed text-slate-300 font-medium">
                                                {researchInsight}
                                            </p>
                                        </div>
                                    )}
                                </aside>

                                <div className="lg:col-span-8 space-y-4">
                                    <div className="flex items-center justify-between px-4 py-2 bg-slate-100 rounded-2xl mb-6">
                                        <span className="text-[11px] font-black text-slate-500 uppercase tracking-wider">النتائج: {results.length}</span>
                                        <select 
                                            value={sortBy} 
                                            onChange={(e) => setSortBy(e.target.value)}
                                            className="bg-transparent text-xs font-bold outline-none cursor-pointer text-slate-900"
                                        >
                                            <option value="year_desc">الأحدث أولاً</option>
                                            <option value="citations">الأكثر استشهاداً</option>
                                            <option value="year_asc">الأقدم أولاً</option>
                                        </select>
                                    </div>

                                    {processedResults.map((paper, idx) => (
                                        <div key={paper.id} className="bg-white border border-slate-200 rounded-[28px] p-6 hover:border-blue-300 hover:shadow-xl transition-all group animate-slide-up" style={{animationDelay: `${idx * 0.05}s`}}>
                                            <div className="flex justify-between items-start mb-4">
                                                <div className="flex gap-2 text-[10px] font-black">
                                                    <span className="bg-blue-50 text-blue-700 px-3 py-1 rounded-lg">{paper.year}</span>
                                                    <span className="bg-slate-100 text-slate-500 px-3 py-1 rounded-lg">متاح</span>
                                                </div>
                                                <button 
                                                    onClick={() => {
                                                        const isBookmarked = bookmarks.find(b => b.id === paper.id);
                                                        if(isBookmarked) setBookmarks(bookmarks.filter(b => b.id !== paper.id));
                                                        else setBookmarks([...bookmarks, paper]);
                                                    }}
                                                    className={`p-2 rounded-xl transition-colors ${bookmarks.find(b => b.id === paper.id) ? 'bg-red-50 text-red-500' : 'text-slate-300 hover:bg-slate-50'}`}
                                                >
                                                    <Icon name="bookmark" className={bookmarks.find(b => b.id === paper.id) ? "fill-current" : ""} />
                                                </button>
                                            </div>
                                            <h3 
                                                onClick={() => setSelectedPaper(paper)}
                                                className="text-xl font-bold text-slate-900 mb-3 cursor-pointer group-hover:text-blue-600 transition-colors"
                                            >
                                                {paper.title}
                                            </h3>
                                            <div className="flex flex-wrap gap-x-6 gap-y-2 mb-6 text-xs text-slate-500">
                                                <div className="flex items-center gap-1.5 font-medium">
                                                    <Icon name="user" size={14} /> {paper.authors}
                                                </div>
                                                <div className="flex items-center gap-1.5 text-blue-600 font-bold">
                                                    <Icon name="award" size={14} /> {paper.citations} Citations
                                                </div>
                                            </div>
                                            <div className="flex justify-between items-center pt-5 border-t border-slate-50">
                                                <button onClick={() => setSelectedPaper(paper)} className="text-xs font-black text-slate-900 flex items-center gap-1">
                                                    عرض التفاصيل <Icon name="chevron-left" size={14} />
                                                </button>
                                                {paper.pdf && (
                                                    <a href={paper.pdf} target="_blank" className="bg-slate-900 text-white p-2 rounded-lg hover:bg-blue-600 transition-colors">
                                                        <Icon name="download" size={14} />
                                                    </a>
                                                )}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        ) : (
                            <div className="py-32 flex flex-col items-center opacity-20">
                                <Icon name="search" size={64} className="mb-4" />
                                <p className="text-2xl font-black text-center">أدخل موضوع بحثك للبدء</p>
                            </div>
                        )}
                    </main>

                    {selectedPaper && (
                        <div className="fixed inset-0 z-[200] flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onClick={() => {setSelectedPaper(null); setSimplifiedAbstract('');}}></div>
                            <div className="bg-white w-full max-w-2xl rounded-[40px] shadow-2xl relative z-10 overflow-hidden animate-slide-up flex flex-col max-h-[90vh]">
                                <div className="p-10 overflow-y-auto custom-scrollbar">
                                    <div className="flex justify-between items-center mb-8">
                                        <span className="text-[10px] font-black text-blue-600 bg-blue-50 px-4 py-1.5 rounded-full">تفاصيل البحث</span>
                                        <button onClick={() => {setSelectedPaper(null); setSimplifiedAbstract('');}} className="p-2 hover:bg-slate-100 rounded-full text-slate-400">
                                            <Icon name="x" size={24} />
                                        </button>
                                    </div>
                                    <h2 className="text-2xl font-black text-slate-900 mb-6 leading-tight">{selectedPaper.title}</h2>
                                    <p className="text-slate-600 text-lg leading-relaxed mb-10">{selectedPaper.abstract}</p>
                                    
                                    <div className="bg-blue-600 rounded-[32px] p-8 text-white mb-10">
                                        <h4 className="text-lg font-black mb-4 flex items-center gap-2">
                                            <Icon name="zap" size={20} className="text-blue-200" /> ملخص الذكاء الاصطناعي
                                        </h4>
                                        {!simplifiedAbstract ? (
                                            <button 
                                                onClick={() => simplifyAbstractAction(selectedPaper)}
                                                disabled={simplifying}
                                                className="bg-white text-blue-600 px-8 py-3 rounded-2xl font-black text-xs hover:bg-blue-50 transition-all"
                                            >
                                                {simplifying ? "جاري التلخيص..." : "لخص المفاهيم"}
                                            </button>
                                        ) : (
                                            <div className="text-blue-50 text-sm leading-loose bg-blue-700/30 p-5 rounded-2xl">
                                                {simplifiedAbstract}
                                            </div>
                                        )}
                                    </div>

                                    <div className="flex gap-4">
                                        {selectedPaper.pdf && (
                                            <a href={selectedPaper.pdf} target="_blank" className="flex-1 bg-slate-900 text-white py-5 rounded-2xl font-black text-center hover:bg-black transition-all">تحميل PDF</a>
                                        )}
                                        <a href={`https://doi.org/${selectedPaper.doi}`} target="_blank" className="flex-1 border-2 border-slate-100 text-slate-900 py-5 rounded-2xl font-black text-center hover:bg-slate-50 transition-all">رابط DOI</a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
